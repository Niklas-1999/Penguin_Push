<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penguin Push</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="gameCanvas" aria-label="Penguin Push game canvas"></canvas>
    <div
      id="joystick"
      class="joystick"
      aria-label="Movement joystick"
      role="application"
    >
      <div class="joystick__base"></div>
      <div class="joystick__knob"></div>
    </div>
    <section id="shotControls" class="shot-controls" aria-label="Shot controls">
      <div class="shot-controls__header">
        <span>Strength</span>
        <span id="strengthValue" class="shot-controls__value">55%</span>
      </div>
      <div class="shot-controls__bar">
        <div id="strengthFill" class="shot-controls__fill"></div>
        <input
          id="strengthSlider"
          class="shot-controls__slider"
          type="range"
          min="0"
          max="100"
          value="55"
          aria-label="Shot strength"
        />
      </div>
      <button id="pushButton" class="shot-controls__push" type="button">Push</button>
    </section>
    <section id="gameOverOverlay" class="game-over" aria-live="polite" hidden>
      <div class="game-over__panel">
        <h1 class="game-over__title">Game Over</h1>
        <p class="game-over__text">The penguin fell off the floe.</p>
        <button id="tryAgainButton" class="game-over__button" type="button">Try again</button>
      </div>
    </section>
    <section id="youWinOverlay" class="you-win" aria-live="polite" hidden>
      <div class="you-win__panel">
        <h1 class="you-win__title">You Win!</h1>
        <p class="you-win__text">All AI penguins fell off the floe.</p>
        <button id="playAgainButton" class="you-win__button" type="button">Play again</button>
      </div>
    </section>
    <script type="module" src="main.js"></script>
  </body>
</html>
